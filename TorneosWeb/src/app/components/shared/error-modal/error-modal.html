<div *ngIf="show" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm transition-all" (click)="close.emit()">
    <div class="bg-gray-800 border border-red-500/40 rounded-2xl w-full max-w-sm p-6 shadow-2xl text-center" (click)="$event.stopPropagation()">
        <div class="bg-red-500/20 text-red-400 w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">✕</div>
        <h3 class="text-xl font-bold text-white mb-2">Error</h3>
        <p class="text-gray-300 mb-6">{{ message }}</p>
        <button (click)="close.emit()" class="bg-gray-700 hover:bg-gray-600 text-gray-300 font-bold py-2.5 px-6 rounded-lg text-sm transition-all">Accept</button>
    </div>
</div>
