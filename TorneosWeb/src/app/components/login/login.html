<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm">
    <div class="bg-gray-800 border border-gray-700 rounded-2xl w-full max-w-sm p-6 shadow-2xl">
        <h3 class="text-xl font-bold text-white mb-1">🔐 Admin Access</h3>
        <p class="text-xs text-gray-400 mb-6">Sign in to manage tournaments, teams and more.</p>
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Email</label>
                <input type="email" [(ngModel)]="email" placeholder="you@example.com"
                       class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Password</label>
                <input type="password" [(ngModel)]="password" placeholder="••••••••"
                       (keyup.enter)="login()"
                       class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 transition">
            </div>
            <div *ngIf="error" class="p-3 bg-red-500/10 border border-red-500/30 rounded-lg text-sm text-red-400">
                {{ error }}
            </div>
        </div>
        <div class="flex gap-3 mt-8">
            <button (click)="cancel()" class="w-1/3 bg-gray-700 hover:bg-gray-600 text-gray-300 font-bold py-3 px-4 rounded-lg text-sm transition">Cancel</button>
            <button (click)="login()" [disabled]="loading"
                    class="w-2/3 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold py-3 px-4 rounded-lg text-sm shadow-md transition-all">
                <span *ngIf="loading" class="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin mr-2 align-middle"></span>
                {{ loading ? 'Signing in...' : 'Sign In' }}
            </button>
        </div>
    </div>
</div>
