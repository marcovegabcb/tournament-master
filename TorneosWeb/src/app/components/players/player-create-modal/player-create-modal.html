<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm transition-all">
    <div class="bg-gray-800 border border-gray-700 rounded-2xl w-full max-w-md p-6 shadow-2xl relative">
        <button (click)="close()" class="absolute top-5 right-5 text-gray-400 hover:text-white transition">✕</button>
        <h3 class="text-xl font-bold text-white mb-1">👥 Register New Player</h3>
        <p class="text-xs text-gray-400 mb-6">Add a new player to the roster.</p>

        <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-500/10 border border-red-500/30 rounded-lg text-sm text-red-400">{{ errorMessage }}</div>

        <div class="space-y-4">
            <div class="flex gap-3">
                <div class="flex-1">
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">First Name</label>
                    <input type="text" [(ngModel)]="newPlayer.firstName" placeholder="e.g., Lionel"
                           class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 transition">
                </div>
                <div class="flex-1">
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Last Name</label>
                    <input type="text" [(ngModel)]="newPlayer.lastName" placeholder="e.g., Messi"
                           class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 transition">
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Jersey Number</label>
                <input type="number" [(ngModel)]="newPlayer.jerseyNumber" min="0" max="99" placeholder="e.g., 10"
                       class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Team</label>
                <select [(ngModel)]="newPlayer.teamId"
                        class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 transition">
                    <option [ngValue]="null">-- Free Agent --</option>
                    <option *ngFor="let team of getFilteredTeams()" [ngValue]="team.id">🛡️ {{ team.name }}</option>
                </select>
            </div>
        </div>
        <div class="flex gap-3 mt-8">
            <button (click)="close()" class="w-1/3 bg-gray-700 hover:bg-gray-600 text-gray-300 font-bold py-3 px-4 rounded-lg text-sm transition">Cancel</button>
            <button (click)="save()" [disabled]="saving"
                    class="w-2/3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg text-sm shadow-md transition-all disabled:opacity-50">
                {{ saving ? 'Saving...' : 'Save Player' }}
            </button>
        </div>
    </div>
</div>
