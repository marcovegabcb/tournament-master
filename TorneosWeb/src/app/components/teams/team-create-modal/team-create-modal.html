<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm transition-all" (click)="close()">
    <div class="bg-gray-800 border border-gray-700 rounded-2xl w-full max-w-lg p-6 shadow-2xl relative" (click)="$event.stopPropagation()">
        <button type="button" (click)="close()" class="absolute top-5 right-5 text-gray-400 hover:text-white transition">✕</button>
        <h3 class="text-xl font-bold text-white mb-1">🛡️ Register New Team</h3>
        <p class="text-xs text-gray-400 mb-6">Enter the team details and add players from scratch.</p>

        <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-500/10 border border-red-500/30 rounded-lg text-sm text-red-400">{{ errorMessage }}</div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Team Name</label>
                <input type="text" [(ngModel)]="newTeam.name" placeholder="e.g., Real Madrid FC"
                       class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Captain Name (optional)</label>
                <input type="text" [(ngModel)]="newTeam.captainName" placeholder="Defaults to first player"
                       class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Logo URL (optional)</label>
                <input type="text" [(ngModel)]="newTeam.logoUrl" placeholder="https://example.com/logo.png"
                       class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Prestige Points</label>
                <div class="w-full bg-gray-900/60 border border-gray-700/50 rounded-lg px-4 py-3 text-sm text-gray-400 flex items-center gap-2">
                    <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                    <span class="text-white font-semibold">100</span>
                    <span class="text-xs text-gray-500 ml-auto">Default — all teams start equal</span>
                </div>
            </div>
            <div *ngIf="!isTennis">
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Home Stadium</label>
                <select [(ngModel)]="newTeam.stadiumId"
                        class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 transition">
                    <option [ngValue]="null">-- No stadium --</option>
                    <option *ngFor="let stadium of stadiumsList.filter(s => !activeSportId || s.sportId === activeSportId)" [ngValue]="stadium.id">🏟️ {{ stadium.name }} ({{ stadium.city }})</option>
                </select>
            </div>
            <div>
                <div class="flex items-center justify-between mb-2">
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">Players</label>
                    <button type="button" (click)="addPlayer()" class="text-xs text-indigo-400 hover:text-indigo-300 font-semibold transition">+ Add Player</button>
                </div>
                <div class="space-y-2">
                    <div *ngFor="let player of newTeamPlayers; let i = index" class="flex items-center gap-2">
                        <input type="text" [(ngModel)]="player.firstName" placeholder="First name"
                               class="flex-1 bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-xs text-white focus:outline-none focus:border-indigo-500 transition">
                        <input type="text" [(ngModel)]="player.lastName" placeholder="Last name"
                               class="flex-1 bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-xs text-white focus:outline-none focus:border-indigo-500 transition">
                        <input type="number" [(ngModel)]="player.jerseyNumber" placeholder="#"
                               class="w-14 bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-xs text-white text-center focus:outline-none focus:border-indigo-500 transition">
                        <button type="button" *ngIf="newTeamPlayers.length > 1" (click)="removePlayer(i)" class="text-red-400 hover:text-red-300 text-xs font-bold p-1">✕</button>
                    </div>
                </div>
                <p *ngIf="newTeamPlayers.length === 0" class="text-xs text-gray-500 mt-1">Click "+ Add Player" to add team members.</p>
            </div>
        </div>
        <div class="flex gap-3 mt-8">
            <button type="button" (click)="close()" class="w-1/3 bg-gray-700 hover:bg-gray-600 text-gray-300 font-bold py-3 px-4 rounded-lg text-sm transition">Cancel</button>
            <button (click)="save()" [disabled]="saving"
                    class="w-2/3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg text-sm shadow-md transition-all disabled:opacity-50">
                {{ saving ? 'Saving...' : 'Save Team' }}
            </button>
        </div>
    </div>
</div>
