<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm transition-all">
    <div class="bg-gray-800 border border-gray-700 rounded-2xl w-full max-w-md p-6 shadow-2xl relative">
        <button (click)="close()" class="absolute top-5 right-5 text-gray-400 hover:text-white transition">✕</button>
        <h3 class="text-xl font-bold text-white mb-1">🏟️ Create New Stadium</h3>
        <p class="text-xs text-gray-400 mb-6">Add a new venue for tournaments and teams.</p>

        <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-500/10 border border-red-500/30 rounded-lg text-sm text-red-400">{{ errorMessage }}</div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Stadium Name</label>
                <input type="text" [(ngModel)]="newStadium.name" placeholder="e.g., Santiago Bernabéu"
                       class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">City</label>
                <input type="text" [(ngModel)]="newStadium.city" placeholder="e.g., Madrid"
                       class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Capacity</label>
                <input type="number" [(ngModel)]="newStadium.capacity" min="0" placeholder="e.g., 81044"
                       class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Dimensions (metres)</label>
                <div class="flex gap-3">
                    <input type="number" [(ngModel)]="newStadium.length" min="0" step="0.1" placeholder="Length"
                           class="w-1/2 bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 transition">
                    <span class="flex items-center text-gray-500 text-sm">x</span>
                    <input type="number" [(ngModel)]="newStadium.width" min="0" step="0.1" placeholder="Width"
                           class="w-1/2 bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 transition">
                </div>
            </div>
        </div>
        <div class="flex gap-3 mt-8">
            <button (click)="close()" class="w-1/3 bg-gray-700 hover:bg-gray-600 text-gray-300 font-bold py-3 px-4 rounded-lg text-sm transition">Cancel</button>
            <button (click)="save()" [disabled]="saving"
                    class="w-2/3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg text-sm shadow-md transition-all disabled:opacity-50">
                <span *ngIf="saving" class="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin mr-2 align-middle"></span>
                {{ saving ? 'Saving...' : 'Create Stadium' }}
            </button>
        </div>
    </div>
</div>
