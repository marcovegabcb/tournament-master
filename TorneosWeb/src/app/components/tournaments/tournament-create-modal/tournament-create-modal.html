<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm transition-all">
    <div class="bg-gray-800 border border-gray-700 rounded-2xl w-full max-w-md p-6 shadow-2xl relative">
        <button (click)="close()" class="absolute top-5 right-5 text-gray-400 hover:text-white transition">✕</button>
        <h3 class="text-xl font-bold text-white mb-1">🏆 Create New Tournament</h3>
        <p class="text-xs text-gray-400 mb-6">Setup the initial rules for this championship.</p>

        <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-500/10 border border-red-500/30 rounded-lg text-sm text-red-400">
            {{ errorMessage }}
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Tournament Name</label>
                <input type="text" [(ngModel)]="newTournament.name" placeholder="e.g., Champions League Pro"
                       class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Minimum Prestige Required (⭐)</label>
                <input type="number" [(ngModel)]="newTournament.minPrestigeRequired" min="0"
                       class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Minimum Players per Team (👥)</label>
                <input type="number" [(ngModel)]="newTournament.minPlayersPerTeam" min="0"
                       class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Competition Format</label>
                <select [(ngModel)]="newTournament.format"
                        class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 transition">
                    <option [ngValue]="0">🛡️ Pure League (Round Robin)</option>
                    <option [ngValue]="1">🔥 Direct Elimination (Knockout / Playoffs)</option>
                    <option [ngValue]="2">🏆 Hybrid Tournament (Groups & Playoffs)</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Match Venue Configuration</label>
                <select [(ngModel)]="newTournament.venueConfig"
                        class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 transition">
                    <option [ngValue]="0">🏠 Home and Away (Double Round)</option>
                    <option [ngValue]="1">⏱️ Single Round (One Match)</option>
                    <option [ngValue]="2">🏟️ Neutral Venue (Tournament Host)</option>
                </select>
            </div>
            <div *ngIf="newTournament.venueConfig === 2">
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Select Stadium</label>
                <select [(ngModel)]="selectedStadiumId"
                        class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 transition">
                    <option [ngValue]="null" disabled>-- Choose a stadium --</option>
                    <option *ngFor="let stadium of stadiumsList" [ngValue]="stadium.id">🏟️ {{ stadium.name }} ({{ stadium.city }})</option>
                </select>
            </div>
        </div>
        <div class="flex gap-3 mt-8">
            <button (click)="close()" class="w-1/3 bg-gray-700 hover:bg-gray-600 text-gray-300 font-bold py-3 px-4 rounded-lg text-sm transition">Cancel</button>
            <button (click)="save()" [disabled]="saving"
                    class="w-2/3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg text-sm shadow-md transition-all disabled:opacity-50">
                <span *ngIf="saving" class="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin mr-2 align-middle"></span>
                {{ saving ? 'Saving...' : 'Save Tournament' }}
            </button>
        </div>
    </div>
</div>
